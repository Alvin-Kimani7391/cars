<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
:root{
  --bg: #0b0b0c;
  --panel: #121214;
  --card: #16161a;
  --border: rgba(255,140,0,0.18);

  --orange: #ff6600;
  --amber: #ffb703;
  --text: #fff3e0;
  --muted: #b9a48f;
}

/* ===== BODY ===== */
body {
  font-family: system-ui, 'Segoe UI', sans-serif;
  margin: 0;
  padding: 20px;
  background: radial-gradient(circle at top, #1a0f0a, var(--bg));
  color: var(--text);
}

/* ===== CHECKOUT CONTAINER ===== */
.checkout-container {
  max-width: 520px;
  margin: auto;
  background: linear-gradient(180deg, var(--panel), #0f0f10);
  padding: 22px;
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.55);
}

/* ===== HEADINGS ===== */
h2 {
  text-align: center;
  margin-bottom: 15px;
  color: var(--amber);
}

/* ===== CART ITEMS ===== */
.cart-item {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 12px;
  margin-bottom: 10px;

  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--border);
}

.cart-item img {
  width: 48px;
  border-radius: 8px;
}

.cart-item h4 {
  font-size: 0.85rem;
  margin: 0;
  color: #ffd7b0;
  white-space: nowrap;      /* Prevent wrapping */
  overflow: hidden;         /* Hide extra text */
  text-overflow: ellipsis;  /* Add "..." */
}


/* ===== QUANTITY CONTROLS ===== */
.qty-controls {
  display: flex;
  gap: 6px;
  align-items: center;
}

.qty-controls button {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--orange), var(--amber));
  color: white;
  font-weight: bold;
}

.qty-controls button:disabled {
  opacity: 0.4;
}

/* ===== REMOVE BUTTON ===== */
.removebtn {
  background: linear-gradient(135deg, #ff3d00, #ff9100);
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

/* ===== INPUTS ===== */
.input-group {
  margin-top: 12px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;

  border-radius: 10px;
  border: 1px solid var(--border);

  background: var(--card);
  color: var(--text);
  outline: none;
}

input:focus, select:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(255,102,0,0.15);
}

/* ===== SUMMARY ===== */
.summary {
  margin-top: 20px;
  padding: 15px;
  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--border);
}

.summary h3 {
  color: var(--amber);
  margin: 0;
}

/* ===== MAIN BUTTON ===== */
button.main {
  width: 100%;
  padding: 14px;
  margin-top: 15px;

  border: none;
  border-radius: 12px;

  background: linear-gradient(135deg, var(--orange), var(--amber));
  color: white;
  font-weight: 700;
  cursor: pointer;

  transition: 0.25s;
}

button.main:hover {
  transform: translateY(-2px);
}

/* ===== PAYMENT MODAL ===== */
.payment-modal {
  display: none;
  margin-top: 15px;
  padding: 15px;

  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--border);
}

/* ===== SUCCESS ===== */
.success {
  text-align: center;
  color: var(--amber);
  font-weight: bold;
}

/* ===== HEADER ===== */
header {
  padding: 16px;
  text-align: center;
  font-size: 1.8rem;
  font-weight: 700;

  background: linear-gradient(135deg, var(--orange), var(--amber));
  color: white;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

/* ===== NAV ===== */
nav {
  display: flex;
  justify-content: center;
  gap: 18px;

  padding: 10px;
  background: #0f0f10;

  position: sticky;
  top: 0;
  z-index: 999;

  border-bottom: 1px solid var(--border);
}

nav a {
  color: #ffd7b0;
  text-decoration: none;
  padding: 8px 12px;
  border-radius: 20px;
}

nav a:hover {
  background: rgba(255,102,0,0.12);
}

/* ===== CART BUTTON ===== */
#showcart {
  position: absolute;
  right: 15px;

  background: linear-gradient(135deg, var(--orange), var(--amber));
  border: none;
  padding: 8px 12px;
  border-radius: 20px;

  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* ===== SIDEBAR ===== */
#button {
  position: fixed;
  top: 14px;
  left: 14px;

  background: #151515;
  border: 1px solid var(--border);
  color: white;

  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
}

#button:hover {
  background: var(--orange);
}

/* ===== SIDEBAR MENU ===== */
.list {
  display: none;
  position: fixed;
  top: 0;
  left: -260px;

  width: 260px;
  height: 100%;

  padding-top: 80px;
  background: linear-gradient(180deg, #1a0f0a, #0a0503);

  transition: 0.3s ease;
}

.list.show {
  left: 0;
}

.list button {
  width: 100%;
  padding: 10px;

  border: none;
  border-radius: 8px;

  background: #1f1208;
  color: white;

  text-align: left;
  cursor: pointer;
}

.list button:hover,
.list button.active {
  background: linear-gradient(135deg, var(--orange), var(--amber));
}

/* ===== FOOTER ===== */
footer {
  background: #0f0a05;
  color: #ccc;
  margin-top: 50px;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .checkout-container {
    margin: 20px 12px;
    padding: 18px;
  }

  nav {
    gap: 10px;
    font-size: 0.85rem;
  }
}

.navfilter {
  position: relative;
  display: inline-block;
  padding: 8px 12px;
  transition: color 0.3s ease;
}

.navfilter::after {
  
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, #ff6600, #ff9900);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.35s ease;
  border-radius: 2px;
}

.navfilter:hover::after,
.navfilter.active::after {
  transform: scaleX(1);
}

.navfilter:hover,
.navfilter.active {
  font-weight: bolder;
}
</style>

</head>

<header><p>Six Star Suppliers</p></header>

            <a href="index.html" class="navfilter">Home</a>
            <a href="product.html" class="navfilter">All Products</a>
            <a href="carstv.html" class="navfilter active">Explore</a>
            <a href="contact.html" class="navfilter">Contact</a>
           
        </nav><br>



<body>

<div class="checkout-container">
<h2>Checkout</h2>

<div id="checkout-items"></div>

<div class="input-group">
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe">
</div>

<div class="input-group">
<label>M-Pesa Number</label>
<input type="text" id="phone" placeholder="0712345678">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="you@example.com">
</div>

<div class="input-group">
<label>Delivery Location</label>
<select id="location" onchange="updateTotal()">
<option value="0">Select Location</option>
<option value="0">Nairobi CBD - Ksh 0</option>
<option value="50">Westlands - Ksh 50</option>
<option value="100">Thika - Ksh 100</option>
<option value="300">Western Region - Ksh 300</option>
<option value="300">Meru Region - Ksh 300</option>
<option value="300">Namanga - Ksh 300</option>
<option value="200">Kajiado - Ksh 200</option>
<option value="400">Coast Region - Ksh 400</option>
</select>
</div>

<div class="summary">
<p>Items Total: Ksh <span id="item-price">0</span></p>
<p>Transport: Ksh <span id="transport-fee">0</span></p>
<h3>Total: Ksh <span id="total-price">0</span></h3>
</div>

<button class="main" onclick="showPayment()">Proceed to Pay</button>

<div id="payment-step" class="payment-modal">
  <button onclick="document.getElementById('payment-step').style.display='none'">
  Close
</button>
<h4>Payment Details</h4>
<p>Send Money to: <strong>0794327798</strong></p>
<p>Name: <strong>Waithera Samuel Kimani</strong></p>

<input type="text" id="mpesa-code" placeholder="Paste M-Pesa Code">

<button onclick="submitOrder(event)">Submit Order</button>
</div>

<p id="msg"></p>

</div>

<script>
  const navItems = document.querySelectorAll('.navfilter');

  navItems.forEach(item => {
    item.addEventListener('click', () => {
      // remove active from all
      navItems.forEach(el => el.classList.remove('active'));

      // add active to clicked one
      item.classList.add('active');
    });
  });
</script>

<script>
const API = "https://cars3-158h.onrender.com";

function cleanProduct(item) {
  return {
    ...item,
    price: Number(String(item.price).replace(/[^0-9]/g, "")) || 0,
    qty: Number(item.qty) || 1
  };
}
// ===============================
// CART
// ===============================
let cart = [];

try {
  cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart = Array.isArray(cart) ? cart.map(cleanProduct) : [];
} catch (e) {
  cart = [];
}

cart = cart.map(i => ({ ...i, qty: i.qty || 1 }));

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

// ===============================
function increaseQty(i){ cart[i].qty++; saveCart(); loadCheckout(); }
function decreaseQty(i){ if(cart[i].qty>1){ cart[i].qty--; saveCart(); loadCheckout(); } }
function removeFromCart(i){ cart.splice(i,1); saveCart(); loadCheckout(); }

// ===============================
function loadCheckout() {
  const container = document.getElementById("checkout-items");
  container.innerHTML = "";

  if(cart.length === 0){
    container.innerHTML = "<p>Your cart is empty</p>";
    updateTotal();
    return;
  }

  cart.forEach((item,i)=>{
    const img = Array.isArray(item.image) ? item.image[0] : item.image;

    container.innerHTML += `
      <div class="cart-item">
        <img src="${img}">
        <h4>${item.make} ${item.model}</h4>

        <div class="qty-controls">
          <button onclick="decreaseQty(${i})" ${item.qty===1?'disabled':''}>-</button>
          <span>${item.qty}</span>
          <button onclick="increaseQty(${i})">+</button>
        </div>

        <p>Ksh ${(item.price*item.qty).toLocaleString()}</p>

        <button class="removebtn" onclick="removeFromCart(${i})">X</button>
      </div>
    `;
  });

  updateTotal();
}

// ===============================
function updateTotal() {
  const transport = Number(document.getElementById("location").value) || 0;
  const items = cart.reduce((s,i)=>s+(i.price*i.qty),0);

  document.getElementById("item-price").innerText = items.toLocaleString();
  document.getElementById("transport-fee").innerText = transport;
  document.getElementById("total-price").innerText = (items+transport).toLocaleString();
}

// ===============================
function showPayment() {
  document.getElementById("payment-step").style.display = "block";
}

// ===============================
async function submitOrder(event) {
  const msg = document.getElementById("msg");
  const btn = event?.target || document.querySelector("#payment-step button:last-of-type");

  // 🛑 prevent double clicks
  if (btn) btn.disabled = true;

  msg.innerHTML = "Processing your order... ⏳";

  // =========================
  // 🔎 GET FORM VALUES
  // =========================
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const mpesaCode = document.getElementById("mpesa-code").value.trim();
  const locationEl = document.getElementById("location");

  const locationValue = locationEl.value;
  const locationText = locationEl.options[locationEl.selectedIndex].text;

  const total = Number(
    document.getElementById("total-price").innerText.replace(/,/g, "")
  );

  // =========================
  // ❌ VALIDATION
  // =========================
  if (!name || !phone || !email || !mpesaCode || locationValue === "0") {
    msg.innerHTML = "<span style='color:red'>Please fill all fields including location</span>";
    if (btn) btn.disabled = false;
    return;
  }

  if (!/^0\d{9}$/.test(phone)) {
    msg.innerHTML = "<span style='color:red'>Enter valid phone (e.g. 0712345678)</span>";
    if (btn) btn.disabled = false;
    return;
  }

  if (cart.length === 0) {
    msg.innerHTML = "<span style='color:red'>Your cart is empty</span>";
    if (btn) btn.disabled = false;
    return;
  }

  // =========================
  // 📦 PREP DATA
  // =========================
  const data = {
    name,
    phone,
    email,
    location: locationText,
    total,
    mpesaCode,
    items: cart
  };

  // =========================
  // ⏱ TIMEOUT HELPER
  // =========================
  const fetchWithTimeout = (url, options, timeout = 10000) => {
    return Promise.race([
      fetch(url, options),
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error("Request timeout")), timeout)
      )
    ]);
  };

  // =========================
  // 🔁 FETCH WITH RETRY
  // =========================
  async function sendRequest(retries = 2) {
    try {
      const res = await fetchWithTimeout(`${API}/confirm-order`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      if (!res.ok) {
        if (retries > 0) {
          msg.innerHTML = "Waking server... retrying ⏳";
          await new Promise(r => setTimeout(r, 2000));
          return sendRequest(retries - 1);
        }
        throw new Error("Server error");
      }

      return res.json();

    } catch (err) {
      if (retries > 0) {
        msg.innerHTML = "Network issue... retrying 🔄";
        await new Promise(r => setTimeout(r, 2000));
        return sendRequest(retries - 1);
      }
      throw err;
    }
  }

  // =========================
  // 🚀 EXECUTE
  // =========================
  try {
    const result = await sendRequest();

    const orderNumber = result.orderNumber;

    localStorage.setItem("lastOrder", orderNumber);
    localStorage.removeItem("cart");

    msg.innerHTML = `
      <div class="success">
        ✅ Order placed successfully<br><br>
        Order Number:<br><b>${orderNumber}</b><br><br>
        Redirecting to tracking...
      </div>
    `;

    setTimeout(() => {
      window.location.href = "trackorder.html";
    }, 2000);

  } catch (err) {
    console.error(err);

    msg.innerHTML = `
      <span style="color:red">
        ❌ Failed to submit order.<br>
        Please check your internet or try again.
      </span>
    `;

    if (btn) btn.disabled = false;
  }
}

// ===============================
document.addEventListener("DOMContentLoaded", loadCheckout);


document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const order = params.get("order");

  if (order) {
    document.getElementById("orderInput").value = order;
    trackOrder(); // auto search immediately
  }
});

</script>

</body>
