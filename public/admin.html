<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Orders Dashboard</title>

<style>
body {
  font-family: system-ui;
  background: #0b1220;
  margin: 0;
  padding: 20px;
  color: #e2e8f0;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* ===== TOP BAR ===== */
.topbar {
  max-width: 1100px;
  margin: auto;
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

button.refresh {
  background: #22c55e;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* ===== SEARCH ===== */
.searchbar {
  max-width: 1100px;
  margin: auto;
  margin-bottom: 15px;
}

.searchbar input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #0f172a;
  color: white;
}

/* ===== STATUS FILTERS ===== */
.tabs {
  max-width: 1100px;
  margin: auto;
  margin-bottom: 15px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tab {
  background: #0f172a;
  border: 1px solid #334155;
  color: white;
  padding: 8px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
}

.tab.active {
  background: #3b82f6;
  border-color: #3b82f6;
}

/* ===== ORDERS ===== */
#orders {
  max-width: 1100px;
  margin: auto;
  display: grid;
  gap: 16px;
}

.card {
  background: #111827;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid #1f2937;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.status {
  padding: 5px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
}

.PENDING { background: orange; }
.CONFIRMED { background: #22c55e; }
.PROCESSING { background: #3b82f6; }
.SHIPPED { background: #a855f7; }
.OUT_FOR_DELIVERY { background: #f59e0b; }
.DELIVERED { background: #16a34a; }

.info p {
  margin: 4px 0;
  font-size: 14px;
  color: #cbd5e1;
}

.controls {
  margin-top: 12px;
  display: flex;
  gap: 10px;
  align-items: center;
}

select {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  background: #0f172a;
  color: white;
  border: 1px solid #334155;
}

button.update {
  background: #3b82f6;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button.update:hover {
  background: #2563eb;
}

.loading, .empty {
  text-align: center;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>📦 Orders Admin Panel</h2>
  <button class="refresh" onclick="loadOrders()">Refresh</button>
</div>

<!-- SEARCH -->
<div class="searchbar">
  <input
    type="text"
    id="search"
    placeholder="Search by name, phone or order number..."
    oninput="applyFilters()"
  />
</div>

<!-- STATUS FILTERS -->
<div class="tabs">
  <button class="tab active" onclick="setFilter('ALL')">ALL</button>
  <button class="tab" onclick="setFilter('PENDING')">PENDING</button>
  <button class="tab" onclick="setFilter('CONFIRMED')">CONFIRMED</button>
  <button class="tab" onclick="setFilter('PROCESSING')">PROCESSING</button>
  <button class="tab" onclick="setFilter('SHIPPED')">SHIPPED</button>
  <button class="tab" onclick="setFilter('OUT_FOR_DELIVERY')">OUT</button>
  <button class="tab" onclick="setFilter('DELIVERED')">DELIVERED</button>
</div>

<div id="orders">
  <div class="loading">Loading...</div>
</div>

<script>
const BASE = "https://cars3-158h.onrender.com";
const ADMIN_KEY = "12345secure";

let allOrders = [];
let statusFilter = "ALL";
let searchTerm = "";

/* =============================== */
const STATUSES = [
  "PENDING",
  "CONFIRMED",
  "PROCESSING",
  "SHIPPED",
  "OUT_FOR_DELIVERY",
  "DELIVERED"
];

/* =============================== */
document.addEventListener("DOMContentLoaded", loadOrders);

/* =============================== */
function renderItems(items) {
  if (!items || !items.length) return "<p>No items</p>";

  return items.map(item => `
    <div style="margin-bottom:8px;">
      • ${item.make} ${item.model} x${item.qty}
      <br>
      <small>KES ${(item.price * item.qty).toLocaleString()}</small>
    </div>
  `).join("");
}

/* =============================== */
async function loadOrders() {
  const res = await fetch(`${BASE}/api/orders`, {
    headers: { "admin-key": ADMIN_KEY }
  });

  allOrders = await res.json();
  renderOrders();
}

/* =============================== */
function renderOrders() {
  const container = document.getElementById("orders");

  let filtered = allOrders;

  // STATUS FILTER
  if (statusFilter !== "ALL") {
    filtered = filtered.filter(o => o.status === statusFilter);
  }

  // SEARCH FILTER
  if (searchTerm.trim()) {
    const term = searchTerm.toLowerCase();

    filtered = filtered.filter(o =>
      o.orderNumber.toLowerCase().includes(term) ||
      o.phone.toLowerCase().includes(term) ||
      (o.name && o.name.toLowerCase().includes(term))
    );
  }

  if (!filtered.length) {
    container.innerHTML = `<p class="empty">No orders found</p>`;
    return;
  }

  container.innerHTML = "";

  filtered.forEach(order => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="header">
        <strong>${order.orderNumber}</strong>
        <span class="status ${order.status}">
          ${order.status}
        </span>
      </div>

      <div class="info">
        <p><b>Name:</b> ${order.name || "N/A"}</p>
        <p><b>Email:</b> ${order.email}</p>
        <p><b>Phone:</b> ${order.phone}</p>

        <div style="margin:10px 0; padding:10px; background:#0f172a; border-radius:8px;">
          <strong>Items:</strong>
          ${renderItems(order.items)}
        </div>

        <p><b>Total:</b> KES ${order.total}</p>
        <p><b>Mpesa:</b> ${order.mpesaCode}</p>
      </div>

      <div class="controls">
        <select id="select-${order._id}">
          ${STATUSES.map(s => `
            <option value="${s}" ${s === order.status ? "selected" : ""}>
              ${s}
            </option>
          `).join("")}
        </select>

        <button class="update" onclick="updateStatus('${order._id}')">
          Update
        </button>
      </div>
    `;

    container.appendChild(div);
  });
}

/* =============================== */
function applyFilters() {
  searchTerm = document.getElementById("search").value;
  renderOrders();
}

/* =============================== */
function setFilter(status) {
  statusFilter = status;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");

  renderOrders();
}

/* =============================== */
async function updateStatus(id) {
  const select = document.getElementById(`select-${id}`);
  const status = select.value;

  await fetch(`${BASE}/api/orders/status/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ status })
  });

  loadOrders();
}
</script>

</body>
</html>
